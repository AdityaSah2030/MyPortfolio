<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya Sah - Portfolio</title>
    <meta name="description" content="Portfolio of Aditya Sah, a passionate tech enthusiast specializing in AI/ML, Python, C++, and IoT.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo">
                <h1 id="nav-name">Aditya Sah<span style="color: var(--accent)">.</span></h1>
            </div>
            <nav>
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#skills">Skills</a></li>
                    <li><a href="#projects">Projects</a></li>
                    <li><a href="#interests">Interests</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
            <div class="nav-controls">
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="nav-toggle" aria-label="Toggle Navigation">
                    <i class="fas fa-bars"></i> 
                </button>
            </div>
        </div>
    </header>

    <section id="home" class="hero">
        <div class="container hero-container">
            <div class="hero-image fade-in">
                <div class="hero-image-card">
                    <img src="Assets/dp3.jpg" alt="Profile Picture">
                </div>
            </div>
            <div class="hero-content fade-in">
                <p class="tagline" id="hero-tagline"></p>
                <h2 class="hero-title" id="hero-name"></h2>
                <h3 class="hero-role" id="hero-role"></h3>
                <p class="hero-description" id="hero-description"></p>
                <div class="hero-buttons">
                    <button onclick="downloadResume()" class="btn">View Resume</button>
                    <a href="#contact" class="btn btn-secondary">Contact Me</a>
                </div>
            </div>
        </div>
    </section>

    <section id="about" class="about">
        <div class="container">
            <h2 class="section-title">About Me</h2>
            <div class="about-content" id="about-content-container">
                <!-- Injected via JS -->
            </div>
        </div>
    </section>

    <section id="skills" class="skills">
        <div class="container">
            <h2 class="section-title">Technical Skills</h2>
            <div class="skills-content" id="skills-content-container">
                <!-- Injected via JS -->
            </div>
        </div>
    </section>

    <section id="projects" class="projects">
        <div class="container">
            <h2 class="section-title">Featured Projects</h2>
            <div class="projects-content" id="projects-content-container">
                <!-- Injected via JS -->
            </div>
        </div>
    </section>

    <section id="interests" class="interests">
        <div class="container">
            <h2 class="section-title">Interests & Hobbies</h2>
            <div class="interests-content" id="interests-content-container">
                <!-- Injected via JS -->
            </div>
        </div>
    </section>

    <section id="contact" class="contact">
        <div class="container">
            <h2 class="section-title">Get In Touch</h2>
            <div class="contact-content fade-in">
                <p id="contact-desc"></p>
                <a href="" class="contact-email" id="contact-email-link"><span id="contact-email-text"></span></a>
                <div class="social-links" id="social-links-container">
                    <!-- Injected via JS -->
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p class="copyright">© 2026 <span id="footer-name"></span>. All rights reserved.</p> 
        </div>
    </footer>

    <div class="back-to-top">
        <i class="fas fa-arrow-up"></i>
    </div>

    <!-- Data Configuration File -->
    <script src="portfolio-data.js"></script>
    <!-- Main UI Logic -->
    <script src="main.js"></script>

</body>
</html>
